<!DOCTYPE html>
<html>
<head>
    <title>Form | Details</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #1e3a8a;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
        }

        input:focus, textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 5px rgba(59,130,246,0.5);
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .error {
            color: #dc2626;
            font-size: 13px;
            margin-top: 3px;
        }

        .output {
            margin-top: 15px;
            background: #f0f9ff;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #3b82f6;
            font-size: 14px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Contact Form</h2>
    <form id="myForm">
        <input type="text" id="name" placeholder="Enter Name">
        <div class="error" id="nameError"></div>

        <input type="text" id="email" placeholder="Enter Email">
        <div class="error" id="emailError"></div>

        <textarea id="message" placeholder="Enter Message"></textarea>
        <div class="error" id="msgError"></div>

        <button type="submit">Submit</button>
    </form>

    <div class="output" id="output"></div>
</div>

<script>
document.getElementById("myForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let message = document.getElementById("message").value.trim();

    let nameError = document.getElementById("nameError");
    let emailError = document.getElementById("emailError");
    let msgError = document.getElementById("msgError");

    nameError.textContent = "";
    emailError.textContent = "";
    msgError.textContent = "";

    let isValid = true;

    let namePattern = /^[A-Za-z ]+$/;
    if (name === "") {
        nameError.textContent = "Name is required";
        isValid = false;
    } else if (!namePattern.test(name)) {
        nameError.textContent = "Only letters allowed";
        isValid = false;
    }

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (email === "") {
        emailError.textContent = "Email is required";
        isValid = false;
    } else if (!emailPattern.test(email)) {
        emailError.textContent = "Invalid email format";
        isValid = false;
    }

    if (message.length < 5) {
        msgError.textContent = "Message must be at least 5 characters";
        isValid = false;
    }

    if (isValid) {
        let result = `
            <strong>Name:</strong> ${name} <br>
            <strong>Email:</strong> ${email} <br>
            <strong>Message:</strong> ${message}
        `;
        document.getElementById("output").innerHTML = result;
    }
});
</script>
<p><a href="https://nishanayak8.github.io/sem4-fet/Assignments/two_css_js.html">Assignment-2-JS</a></p>

</body>
</html>
