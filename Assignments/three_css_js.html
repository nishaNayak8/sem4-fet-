<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Contact Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        fieldset {
            margin-bottom: 15px;
            padding: 10px;
        }

        legend {
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        .error {
            color: red;
            font-size: 14px;
        }

        #output {
            margin-top: 20px;
            background: #e8f5e9;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Contact Form</h2>

    <form id="contactForm">

        <!-- Name -->
        <label>Name:</label>
        <input type="text" id="name">
        <span class="error" id="nameError"></span>

        <!-- Email -->
        <label>Email:</label>
        <input type="text" id="email">
        <span class="error" id="emailError"></span>

        <!-- Radio Buttons -->
        <fieldset>
            <legend>Gender</legend>

            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female
        </fieldset>

        <!-- Checkboxes -->
        <fieldset>
            <legend>Select Skills</legend>

            <input type="checkbox" name="skills" value="HTML"> HTML
            <input type="checkbox" name="skills" value="CSS"> CSS
            <input type="checkbox" name="skills" value="JavaScript"> JavaScript
        </fieldset>

        <!-- Message -->
        <label>Message:</label>
        <textarea id="message"></textarea>
        <span class="error" id="msgError"></span>

        <button type="submit">Submit</button>

    </form>

    <div id="output"></div>

</div>

<script>

document.getElementById("contactForm").addEventListener("submit", function(event) {

    event.preventDefault();

    let isValid = true;

    // Input values
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let message = document.getElementById("message").value.trim();

    // Error elements
    let nameError = document.getElementById("nameError");
    let emailError = document.getElementById("emailError");
    let msgError = document.getElementById("msgError");

    // Clear previous errors
    nameError.textContent = "";
    emailError.textContent = "";
    msgError.textContent = "";

    // Name validation
    let namePattern = /^[A-Za-z ]+$/;

    if (name === "") {
        nameError.textContent = "Name is required";
        isValid = false;
    }
    else if (!namePattern.test(name)) {
        nameError.textContent = "Only letters allowed";
        isValid = false;
    }

    // Email validation
    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if (email === "") {
        emailError.textContent = "Email is required";
        isValid = false;
    }
    else if (!emailPattern.test(email)) {
        emailError.textContent = "Invalid email";
        isValid = false;
    }

    // Message validation
    if (message.length < 5) {
        msgError.textContent = "Message must be at least 5 characters";
        isValid = false;
    }

    // Radio button value
    let gender = "";
    let genderOptions = document.getElementsByName("gender");

    for (let i = 0; i < genderOptions.length; i++) {

        if (genderOptions[i].checked) {
            gender = genderOptions[i].value;
        }
    }

    // Checkbox values using loop
    let skills = [];
    let skillOptions = document.getElementsByName("skills");

    for (let i = 0; i < skillOptions.length; i++) {

        if (skillOptions[i].checked) {
            skills.push(skillOptions[i].value);
        }
    }

    // Final Output
    if (isValid) {

        let result = `
            <strong>Name:</strong> ${name} <br>
            <strong>Email:</strong> ${email} <br>
            <strong>Gender:</strong> ${gender} <br>
            <strong>Skills:</strong> ${skills.join(", ")} <br>
            <strong>Message:</strong> ${message}
        `;

        document.getElementById("output").innerHTML = result;
    }

});

</script>

</body>
</html>
