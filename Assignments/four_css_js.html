<!DOCTYPE html>
<html>
<head>
  <title>Z-Index Single Box Demo</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    .container {
      position: relative;
      width: 200px;
      height: 200px;
      margin: auto;
    }

    .box {
      position: absolute;
      width: 200px;
      height: 200px;
      color: white;
      font-size: 25px;
      line-height: 200px;
      border-radius: 10px;
    }

    .red {
      background: red;
      z-index: 1;
    }

    .blue {
      background: blue;
      z-index: 2;
    }

    .green {
      background: green;
      z-index: 3;
    }

    button {
      margin-top: 20px;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Z-Index Demo</h1>

  <!-- All boxes overlap in one place -->
  <div class="container">
    <div class="box red" id="redBox">Red</div>
    <div class="box blue" id="blueBox">Blue</div>
    <div class="box green" id="greenBox">Green</div>
  </div>

  <br>

  <!-- Buttons -->
  <button onclick="showBox('redBox')">Show Red</button>
  <button onclick="showBox('blueBox')">Show Blue</button>
  <button onclick="showBox('greenBox')">Show Green</button>

  <script>
    let z = 3;

    function showBox(id) {
      z++;
      document.getElementById(id).style.zIndex = z;
    }
  </script>

</body>
</html>
